name: CI

on:
  push:
    branches: [main]
  pull_request:

# 최소 권한 (읽기 전용).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # 검증 코어 + 테스트는 의존성 0 (node:test / node:crypto) -> install 불필요.
      - run: npm test
